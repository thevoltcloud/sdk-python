# CI for thevoltcloud/sdk-python.
name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy
      - name: Pytest
        run: pytest -q

  openapi-drift:
    # The hand-written surface tracks the OpenAPI source of truth in
    # thevoltcloud/volt. This job is a placeholder for the codegen-drift check
    # (regenerate src/volt/_generated and fail if it differs).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "codegen drift check wired when volt/api/openapi is published to a fetchable URL"

  secret-scan:
    uses: thevoltcloud/.github/.github/workflows/shared-secret-scan.yml@main
    secrets: inherit
